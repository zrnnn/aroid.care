    <style>
        body {
            background-color: #060a07;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Immersive background image with blur and top-to-bottom fade */
        .bg-img-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('./assets/background_2.png');
            background-size: cover;
            background-position: center top;
            filter: blur(6px);
            opacity: 1;
            -webkit-mask-image: linear-gradient(to bottom, black 0%, rgba(0,0,0,0.15) 50%, rgba(0,0,0,0.15) 100%);
            mask-image: linear-gradient(to bottom, black 0%, rgba(0,0,0,0.15) 50%, rgba(0,0,0,0.15) 100%);
            z-index: -1;
            pointer-events: none;
            transform-origin: center center;
            transform: scale(1.1) translate(0px, 0px);
            transition: transform 0.3s ease-out;
            will-change: transform;
        }

        /* Subtle diagonal light ray overlay */
        .light-ray-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(130deg, 
                transparent 10%, 
                rgba(255, 255, 255, 0.02) 20%, 
                rgba(255, 255, 255, 0.06) 25%, 
                rgba(255, 255, 255, 0.02) 30%, 
                transparent 45%
            );
            mix-blend-mode: overlay;
            z-index: -1;
            pointer-events: none;
        }

        /* Crisp morning sun ray overlay when weather is cleared */
        #sun-ray-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 60% -20%, rgba(255, 255, 240, 0.6) 0%, rgba(240, 255, 245, 0.25) 40%, transparent 75%),
                        linear-gradient(to bottom, rgba(255, 255, 255, 0.15) 0%, transparent 40%);
            mix-blend-mode: overlay;
            z-index: -1;
            pointer-events: none;
            transition: opacity 1.5s ease-in-out;
            opacity: 0;
        }

        .fade-in { animation: fadeIn 0.8s ease; }
        .nav-fade-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 160px;
            pointer-events: none;
            z-index: 90;
            background: linear-gradient(to bottom, 
                rgba(6,10,7,0.2) 0%, 
                rgba(6,10,7,0.2) 96px, 
                rgba(6,10,7,0.15) 112px, 
                rgba(6,10,7,0.08) 128px, 
                rgba(6,10,7,0.02) 144px, 
                rgba(6,10,7,0) 160px);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            -webkit-mask-image: linear-gradient(to bottom, 
                black 0%, 
                black 96px, 
                rgba(0,0,0,0.8) 112px, 
                rgba(0,0,0,0.4) 128px, 
                rgba(0,0,0,0.1) 144px, 
                transparent 160px);
            mask-image: linear-gradient(to bottom, 
                black 0%, 
                black 96px, 
                rgba(0,0,0,0.8) 112px, 
                rgba(0,0,0,0.4) 128px, 
                rgba(0,0,0,0.1) 144px, 
                transparent 160px);
        }
        .slide-up { animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 
                inset 0 1px 0 rgba(255, 255, 255, 0.1),
                inset 0 -4px 15px rgba(255, 255, 255, 0.04),
                inset 0 -1px 0 rgba(255, 255, 255, 0.1),
                0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .huge-header {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(2.5rem, 8vw, 6rem);
            line-height: 1;
            letter-spacing: -0.02em;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 0 4px 40px rgba(0, 0, 0, 1), 0 2px 10px rgba(0, 0, 0, 1);
        }

        .dynamic-title {

            font-size: clamp(2.5rem, 6vw, 4.5rem);
            line-height: 0.85;
            letter-spacing: -0.05em;
        }

        .dynamic-quote {

        .dynamic-text {

        .plant-card { transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); }

        .img-container {

    <script>
        // Smooth Cursor Parallax for Background
        window.addEventListener('mousemove', (e) => {
            const bg = document.querySelector('.bg-img-overlay');
            if (bg) {
                // Inverted movement: Cursor left -> Image right
                const moveX = ((e.clientX / window.innerWidth) - 0.5) * -40; // Max 20px
                const moveY = ((e.clientY / window.innerHeight) - 0.5) * -40; // Max 20px
                bg.style.transform = `scale(1.1) translate(${moveX}px, ${moveY}px)`;
            }
        });

        window.addEventListener('scroll', () => {

            const btn = document.getElementById('scrollToTopBtn');
            if (window.scrollY > 500) {
                btn.classList.remove('opacity-0', 'translate-y-10', 'pointer-events-none');
                btn.classList.add('opacity-100', 'translate-y-0', 'pointer-events-auto');
            } else {
                btn.classList.add('opacity-0', 'translate-y-10', 'pointer-events-none');
                btn.classList.remove('opacity-100', 'translate-y-0', 'pointer-events-auto');
            }
        });

        function initHumidityEffect() {
            // Remove old overlay if any
            const old = document.querySelector('.fog-overlay');
            if(old) old.remove();

            const canvas = document.createElement('canvas');
            canvas.className = 'fog-overlay';
            canvas.style.position = 'fixed';
            canvas.style.top = '0';
            canvas.style.left = '0';
            canvas.style.width = '100vw';
            canvas.style.height = '100vh';
            canvas.style.pointerEvents = 'none';
            canvas.style.zIndex = '1'; // Move above background but below actual content
            document.body.appendChild(canvas);

            const ctx = canvas.getContext('2d', { alpha: true });
            let width, height;

            // Track UI elements for rain collision
            let uiRects = [];
            function updateUIRects() {
                uiRects = [];
                const elements = document.querySelectorAll('.glass, .bg-forest-900\\/90'); 
                elements.forEach(el => {
                    const rect = el.getBoundingClientRect();
                    // Only care about visible elements
                    if(rect.width > 0 && rect.height > 0 && rect.top < window.innerHeight && rect.bottom > 0) {
                        uiRects.push(rect);
                    }
                });
            }

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                updateUIRects();
            }
            window.addEventListener('resize', resize);
            window.addEventListener('scroll', updateUIRects);
            setInterval(updateUIRects, 500); // Catch-all for DOM changes
            resize();

            window.rainIntensity = 0.0;
            window.updateRainIntensity = function(val) {
                window.rainIntensity = parseFloat(val);
                
                // Toggle sun ray effect based on intensity
                const sunRay = document.getElementById('sun-ray-overlay');
                if(sunRay) {
                    // Fully visible at 0, slowly fading out by intensity 0.5
                    sunRay.style.opacity = Math.max(0, 1 - (window.rainIntensity * 2));
                }
            };

            // Layered rain drops for 3D depth effect (Opacities reduced to 70% of max)
            const layers = [
                { drops: [], filter: 'blur(5px)', countPercent: 1.20, speedMod: 0.6, lengthMod: 0.4, widthMod: 0.5, opacity: 0.007, interact: false },   // Far background
                { drops: [], filter: 'blur(3px)', countPercent: 0.40, speedMod: 0.9, lengthMod: 0.7, widthMod: 0.8, opacity: 0.014, interact: true },    // Mid background
                { drops: [], filter: 'blur(1.5px)', countPercent: 0.08, speedMod: 1.3, lengthMod: 1.2, widthMod: 1.5, opacity: 0.0245, interact: true }, // Near background
                { drops: [], filter: 'none', countPercent: 0.02, speedMod: 1.8, lengthMod: 2.0, widthMod: 2.0, opacity: 0.042, interact: true }          // Foreground
            ];

            // Generate drops for max intensity (2.0)
            const totalDrops = Math.floor((width * height) / 1650); // Reduced max storm capacity by 10%

            for(let layer of layers) {
                const count = Math.floor(totalDrops * layer.countPercent);
                for(let i=0; i<count; i++) {
                    const irregularity = Math.random() * 0.8 + 0.6;
                    layer.drops.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        length: (Math.random() * 15 + 10) * layer.lengthMod * irregularity,
                        baseSpeed: (Math.random() * 5 + 8) * layer.speedMod * irregularity, // Store base speed
                        width: layer.widthMod * (Math.random() * 0.5 + 0.75),
                        opacity: layer.opacity * (Math.random() * 0.5 + 0.75)
                    });
                }
            }

            const splashes = [];
            const screenDrops = [];

            // Create offscreen droplet texture for screen hits
            const dropSize = 64;
            const dropCanvas = document.createElement('canvas');
            dropCanvas.width = dropSize;
            dropCanvas.height = dropSize;
            const dCtx = dropCanvas.getContext('2d');
            const center = dropSize / 2;
            const r = center * 0.8;
            
            dCtx.beginPath();
            dCtx.arc(center, center, r, 0, Math.PI * 2);
            dCtx.fillStyle = 'rgba(255, 255, 255, 0.05)';
            dCtx.shadowColor = 'rgba(0, 0, 0, 0.2)';
            dCtx.shadowBlur = 8;
            dCtx.shadowOffsetY = 2;
            dCtx.fill();
            
            dCtx.shadowColor = 'transparent';
            const dGrad = dCtx.createRadialGradient(center - r*0.3, center - r*0.3, r*0.1, center, center, r);
            dGrad.addColorStop(0, 'rgba(255, 255, 255, 0.4)');
            dGrad.addColorStop(1, 'rgba(255, 255, 255, 0.05)');
            dCtx.fillStyle = dGrad;
            dCtx.fill();
            
            dCtx.beginPath();
            dCtx.arc(center, center + r*0.5, r*0.4, 0, Math.PI * 2);
            dCtx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            dCtx.fill();

            function loop() {
                ctx.filter = 'none';
                ctx.clearRect(0, 0, width, height);
                ctx.lineCap = 'round';
                
                for(let layer of layers) {
                    // Completely disable layer if intensity is 0
                    if (window.rainIntensity <= 0) continue;

                    ctx.filter = layer.filter;
                    ctx.beginPath();
                    
                    // Only process active droplets based on intensity
                    const activeCount = Math.floor(layer.drops.length * (window.rainIntensity / 2.0));
                    
                    for(let i=0; i<activeCount; i++) {
                        let drop = layer.drops[i];
                        const oldY = drop.y;
                        ctx.moveTo(drop.x, drop.y);
                        
                        // Dynamic length based on intensity (faster = longer motion blur streak)
                        const currentLength = drop.length * Math.max(1, window.rainIntensity);
                        
                        // Diagonal fall
                        ctx.lineTo(drop.x + currentLength * 0.15, drop.y + currentLength);
                        
                        // Calculate dynamic speed
                        const currentSpeed = drop.baseSpeed * Math.max(0.1, window.rainIntensity);
                        
                        drop.x += currentSpeed * 0.15;
                        drop.y += currentSpeed;
                        const newY = drop.y + currentLength;

                        // Collision detection
                        let collided = false;
                        if(layer.interact && window.rainIntensity > 0) {
                            for(let rect of uiRects) {
                                // Check if drop tip crossed the top edge of a UI element. Use a slightly expanded hit area.
                                if(oldY + currentLength <= rect.top + 5 && newY >= rect.top - 5 && drop.x >= rect.left && drop.x <= rect.right) {
                                    collided = true;
                                    
                                    // Spawn splashes based on intensity
                                    const splashCount = Math.floor(Math.random() * 2 * window.rainIntensity) + 1; 
                                    for(let j=0; j<splashCount; j++) {
                                        splashes.push({
                                            x: drop.x + currentLength * 0.15,
                                            y: rect.top,
                                            vx: (Math.random() - 0.5) * 4 + 0.5,
                                            vy: -(Math.random() * 2 + 1.5),
                                            life: Math.random() * 10 + 5,
                                            maxLife: 15,
                                            opacity: Math.min(layer.opacity * 4 + 0.1, 0.6)
                                        });
                                    }
                                    
                                    // Reset drop
                                    drop.y = -currentLength - (Math.random() * 100);
                                    drop.x = Math.random() * width;
                                    break;
                                }
                            }
                        }

                        if(!collided) {
                            // Wrap around
                            if(drop.y > height) {
                                drop.y = -currentLength - (Math.random() * 100);
                                drop.x = Math.random() * width;
                            }
                            if(drop.x > width) {
                                drop.x = 0;
                            }
                        }
                    }
                    
                    // Stroke the active layer with dynamically scaled opacity and thickness
                    if(activeCount > 0) {
                        // Exponential scaling for max rain reduced by another 10%
                        const intensityMod = window.rainIntensity <= 1.0 
                            ? 0.5 + (window.rainIntensity * 0.5) 
                            : 1.0 + Math.pow(window.rainIntensity - 1.0, 1.5) * 1.8; 
                            
                        ctx.lineWidth = layer.drops[0].width * intensityMod; 
                        // Tinted slightly green/sage to simulate refraction of the forest background
                        ctx.strokeStyle = `rgba(215, 235, 220, ${layer.opacity * intensityMod})`;
                        ctx.stroke();
                    }
                }

                // Draw splashes
                if(splashes.length > 0) {
                    ctx.filter = 'none';
                    for(let i=splashes.length-1; i>=0; i--) {
                        let s = splashes[i];
                        ctx.beginPath();
                        ctx.moveTo(s.x, s.y);
                        // Draw a short trailing line for the splash particle
                        ctx.lineTo(s.x + s.vx * 1.5, s.y + s.vy * 1.5);
                        ctx.lineWidth = 1.5;
                        // Fade out over life
                        const currentOpacity = s.opacity * (s.life / s.maxLife);
                        // Tinted splashes
                        ctx.strokeStyle = `rgba(215, 235, 220, ${currentOpacity})`;
                        ctx.stroke();

                        s.x += s.vx;
                        s.y += s.vy;
                        s.vy += 0.5; // gravity pulls it down
                        s.life--;

                        if(s.life <= 0) {
                            splashes.splice(i, 1);
                        }
                    }
                }

                // Update and render full-screen droplet masks
                if (screenDrops.length < 6 * window.rainIntensity && Math.random() < 0.05 * window.rainIntensity) {
                    screenDrops.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        size: Math.random() * 120 + 120, // 120px to 240px (reduced max size to ~70%)
                        life: 0,
                        maxLife: Math.random() * 60 + 60, // 1 to 2 seconds
                    });
                }

                if (screenDrops.length > 0 || blurLayer.style.maskImage !== 'none') {
                    let masks = [];
                    let bgGradients = [];
                    for (let i = screenDrops.length - 1; i >= 0; i--) {
                        let sd = screenDrops[i];
                        sd.life++;
                        
                        if (sd.life >= sd.maxLife) {
                            screenDrops.splice(i, 1);
                            continue;
                        }

                        let opacity = 1;
                        if (sd.life < 15) opacity = sd.life / 15;
                        else if (sd.life > sd.maxLife - 30) opacity = (sd.maxLife - sd.life) / 30;
                        
                        // Limit max opacity to keep the blur soft and subtle
                        opacity *= 0.8;

                        masks.push(`radial-gradient(${sd.size/2}px circle at ${sd.x}px ${sd.y}px, rgba(0,0,0,${opacity}) 0%, rgba(0,0,0,0) 100%)`);
                        bgGradients.push(`radial-gradient(${sd.size/2}px circle at ${sd.x}px ${sd.y}px, rgba(255,255,255,${opacity * 0.03}) 0%, rgba(255,255,255,0) 100%)`);
                    }

                    if (masks.length > 0) {
                        const maskStr = masks.join(', ');
                        blurLayer.style.display = 'block';
                        blurLayer.style.maskImage = maskStr;
                        blurLayer.style.WebkitMaskImage = maskStr;
                        blurLayer.style.backgroundImage = bgGradients.join(', ');
                    } else {
                        blurLayer.style.display = 'none';
                    }
                }

                requestAnimationFrame(loop);
            }
            
            // Full-screen blur layer for flawless soft-edge droplets
            const blurLayer = document.createElement('div');
            blurLayer.style.position = 'fixed';
            blurLayer.style.inset = '0';
            blurLayer.style.pointerEvents = 'none';
            blurLayer.style.zIndex = '9998'; 
            blurLayer.style.backdropFilter = 'blur(10px)';
            blurLayer.style.WebkitBackdropFilter = 'blur(10px)';
            blurLayer.style.display = 'none'; // hide by default
            document.body.appendChild(blurLayer);
            
            loop();
        }

        document.addEventListener('DOMContentLoaded', initHumidityEffect);

    </script>

                url.searchParams.set('view', view);
                ['id', 'filter'].forEach(p => url.searchParams.delete(p));
                for (const [key, value] of Object.entries(params)) { url.searchParams.set(key, value); }
                try {
                    history.pushState({ view, params }, '', url);
                } catch (e) {
                    console.warn("History pushState failed. This is expected if running from a local file:// URI.");
                }
            }
            if(view !== 'catalog') {
                document.getElementById('searchInput').value = '';
                currentSearchTerm = '';
            }
            renderView(view, params);
        }

        function renderView(view, params) {
            updateNav(view);
            switch (view) {
                case 'catalog': showCatalog(params.filter || ''); break;
                case 'detail': showPlantDetail(Number(params.id)); break;
                case 'diagnosticDetail': showDiagnosticDetail(params.type, params.id); break;
                case 'firstaid': showFirstAid(); break;
                case 'propagation': showPropagation(); break;

                    if (el) {
                        const y = el.getBoundingClientRect().top + window.scrollY - 100;
                        window.scrollTo({top: y, behavior: 'smooth'});
                    }
                }, 150);
            }

        function updateNav(view) {
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));

            if(view === 'cultivation') document.getElementById('nav-cultivation').classList.add('active');

        function updateVPDGauge() {

            const rh = parseFloat(document.getElementById('vpd-rh').value);

            const vpd = svp * (1 - (rh / 100));

            document.getElementById('vpd-display').innerText = vpdStr;
            const container = document.getElementById('vpd-gauge-container');
            const status = document.getElementById('vpd-status');
            
            container.classList.remove('border-sage-400', 'border-red-500', 'border-cyan-500', 'border-amber-400');
            status.classList.remove('text-sage-400', 'text-red-500', 'text-cyan-500', 'text-amber-400');

            if (vpd >= 0.8 && vpd <= 1.2) {
                container.classList.add('border-sage-400');
                status.classList.add('text-sage-400');
                status.innerText = 'Ideal Range';
            } else if (vpd > 1.2 && vpd <= 1.6) {
                container.classList.add('border-amber-400');

                status.classList.add('text-red-500');
                status.innerText = 'High Risk of Leaf Burn';

            data.forEach((item, index) => {

                    pathData += " L " + x + " " + (yCenter + width);

                svg += '<path d="'+pathData+'" fill="'+color+'0.7)" />';
            });

            svg += '</svg>';

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 slide-up mb-24" style="animation-delay: 0.1s;">
                        <div class="glass p-10 md:p-16 rounded-[2rem] group hover:bg-white/5 transition-all duration-500">
                            <span class="text-[10px] font-black text-sage-400 uppercase tracking-widest block mb-4">Acidity & Alkalinity</span>
                            <h2 class="text-2xl md:text-3xl font-black uppercase tracking-tighter mb-6">The Importance of pH</h2>
                            <p class="text-white/60 text-sm leading-relaxed mb-6">pH determines the solubility of nutrients in your water and substrate. If the pH is too high (alkaline) or too low (acidic), certain nutrients precipitate out of the solution and become physically unavailable to the plant's roots. This leads to severe nutrient lock-out, causing deficiencies even if your soil is packed with fertilizer.</p>
                            <a onclick="navigateTo('firstaid', {hash: 'nutrient-deficiencies'})" class="text-[10px] font-black uppercase tracking-widest text-cyan-400 hover:text-white cursor-pointer transition-colors flex items-center gap-2 w-fit mb-6"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-width="2"/></svg> View Nutrient Deficiencies Guide</a>
                            <ul class="text-sm text-white/70 space-y-4">
                                <li class="flex gap-4 items-start"><div class="w-2 h-2 rounded-full bg-sage-400 mt-1.5 shrink-0"></div><div><strong>Soil Target (6.0 - 6.5):</strong> Organic substrates buffer pH naturally. A slightly acidic environment is ideal for most tropicals.</div></li>
                                <li class="flex gap-4 items-start"><div class="w-2 h-2 rounded-full bg-cyan-400 mt-1.5 shrink-0"></div><div><strong>Hydro/Pon Target (5.5 - 6.0):</strong> Inert media lacks buffering capacity. A lower pH is required to keep micronutrients like Iron fully dissolved.</div></li>
                            </ul>
                        </div>
                        <div class="glass p-10 md:p-16 rounded-[2rem] group hover:bg-white/5 transition-all duration-500">
                            <span class="text-[10px] font-black text-sage-400 uppercase tracking-widest block mb-4">Electrical Conductivity</span>
                            <h2 class="text-2xl md:text-3xl font-black uppercase tracking-tighter mb-6">EC & Water Types</h2>
                            <p class="text-white/60 text-sm leading-relaxed mb-6">EC measures the total dissolved salts (nutrients) in your water. It tells you the "strength" of your feed. Too high, and you burn the roots via osmotic shock; too low, and the plant starves.</p>
                            <ul class="text-sm text-white/70 space-y-4">
                                <li class="flex gap-4 items-start"><div class="w-2 h-2 rounded-full bg-emerald-400 mt-1.5 shrink-0"></div><div><strong>Osmosis (RO) Water:</strong> Pure water (EC 0.0, pH ~7.0). A perfect blank canvas for precise nutrient mixing, but you <em>must</em> add Cal-Mag first.</div></li>
                                <li class="flex gap-4 items-start"><div class="w-2 h-2 rounded-full bg-amber-400 mt-1.5 shrink-0"></div><div><strong>Soft Water:</strong> Low in dissolved minerals. Great for most tropicals, but may occasionally require Calcium/Magnesium supplementation.</div></li>
                                <li class="flex gap-4 items-start"><div class="w-2 h-2 rounded-full bg-red-400 mt-1.5 shrink-0"></div><div><strong>Hard Water:</strong> High in Calcium Carbonate (high EC/pH out of the tap). Can cause severe mineral crusting on roots and leaves over time.</div></li>
                            </ul>
                        </div>
                    </div>

                    <div class="glass p-10 md:p-16 rounded-[2rem] slide-up mb-32 border-t border-white/5" style="animation-delay: 0.2s;">
                        <h2 class="text-2xl md:text-3xl font-black uppercase tracking-tighter mb-4 text-center">Nutrient Availability by pH</h2>
                        <p class="text-white/50 text-sm text-center mb-12 max-w-2xl mx-auto">The thicker the bar, the higher the biological availability of the nutrient. Notice how Iron (Fe) becomes rapidly locked out as pH rises, while Macronutrients (N, P, K) thrive in slightly acidic conditions.</p>
                        
                        <div class="grid grid-cols-1 xl:grid-cols-2 gap-12">
                            <div>
                                <h3 class="text-xl font-black uppercase tracking-widest text-sage-400 mb-6 text-center">Organic Soil</h3>
                                ${generatePHChart('soil')}
                            </div>
                            <div>
                                <h3 class="text-xl font-black uppercase tracking-widest text-cyan-400 mb-6 text-center">Hydroponics / Substrate</h3>
                                ${generatePHChart('hydro')}
                            </div>
                        </div>
                    </div>

                    <h2 class="text-3xl md:text-4xl font-black uppercase tracking-tighter mt-32 mb-12 border-b border-white/10 pb-6 slide-up">IKEA Milsbo Smart Greenhouses</h2>
                    
                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-16 slide-up" style="animation-delay: 0.3s;">
                        <div class="lg:col-span-8 glass p-10 md:p-16 rounded-[2rem] flex flex-col justify-center">
                            <h2 class="text-2xl md:text-3xl font-black uppercase tracking-tighter mb-6">Engineering the Microclimate</h2>
                            <p class="text-white/60 text-sm leading-relaxed mb-6">Converting an IKEA Milsbo (Tall or Wide) into a premium indoor greenhouse requires meticulous planning to prevent rust, mold, and electrical hazards.</p>
                            <ul class="text-sm text-white/70 space-y-4">
                                <li class="flex gap-4 items-start">
                                    <div class="w-2 h-2 rounded-full bg-sage-400 mt-1.5 shrink-0"></div>
                                    <div><strong>Weatherstripping:</strong> Use high-quality silicone weatherstripping around all glass doors. The goal is to trap 80%+ humidity, reducing the need for an active humidifier which can cause wet-rot on leaves.</div>
                                </li>
                                <li class="flex gap-4 items-start">
                                    <div class="w-2 h-2 rounded-full bg-sage-400 mt-1.5 shrink-0"></div>
                                    <div><strong>3D Printed Airflow:</strong> High humidity without airflow equals catastrophic fungal infections. Use 3D printed corner-brackets to mount 120mm PC fans (like AC Infinity or Noctua) at 45-degree angles to create a "vortex" of circular air. Use custom 3D printed Skadis pegboards instead of solid glass shelves to allow air to flow vertically.</div>
                                </li>
                                <li class="flex gap-4 items-start">
                                    <div class="w-2 h-2 rounded-full bg-sage-400 mt-1.5 shrink-0"></div>
                                    <div><strong>Lighting & Wiring:</strong> Mount Barrina T5 LEDs using magnetic brackets or 3D printed clips to the metal ceiling and under shelves. Route all cables cleanly through a custom-drilled hole in the metal base (fitted with a rubber grommet to prevent wire fraying).</div>
                                </li>
                                <li class="flex gap-4 items-start">
                                    <div class="w-2 h-2 rounded-full bg-sage-400 mt-1.5 shrink-0"></div>
                                    <div><strong>Smart Automation:</strong> Integrate a local microcontroller (ESP32) or smart plugs connected to Home Assistant. Use BME280 or DHT22 sensors to track Vapor Pressure Deficit (VPD). Automate the fans to ramp up when humidity peaks above 90% or when the grow lights turn on.</div>
                                </li>
                            </ul>
                        </div>
                        <div class="lg:col-span-4 flex flex-col gap-8">
                            <div class="glass p-2 md:p-3 rounded-[2rem] shadow-2xl group flex-grow">
                                <div class="w-full h-full min-h-[400px] rounded-[1.5rem] overflow-hidden relative">
                                    <img src="./assets/ui_cabinet.jpg" class="absolute inset-0 w-full h-full object-cover object-center mix-blend-luminosity opacity-80 group-hover:mix-blend-normal group-hover:opacity-100 group-hover:scale-105 transition-all duration-1000" alt="IKEA Milsbo Smart Greenhouse Cabinet">
                                    <div class="absolute inset-0 bg-gradient-to-t from-forest-950/80 via-transparent to-transparent pointer-events-none"></div>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="glass p-6 rounded-[2rem] border border-white/5 bg-white/5 flex flex-col justify-center text-center group hover:bg-white/10 transition-colors">
                                    <div class="w-12 h-12 mx-auto bg-sage-400/20 rounded-full flex items-center justify-center mb-4">
                                        <svg class="w-6 h-6 text-sage-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" stroke-width="2"/></svg>
                                    </div>
                                    <h3 class="font-black text-[10px] md:text-xs uppercase tracking-widest text-white group-hover:text-sage-400 transition-colors">3D Mods</h3>
                                </div>
                                <div class="glass p-6 rounded-[2rem] border border-white/5 bg-white/5 flex flex-col justify-center text-center group hover:bg-white/10 transition-colors">
                                    <div class="w-12 h-12 mx-auto bg-cyan-400/20 rounded-full flex items-center justify-center mb-4">
                                        <svg class="w-6 h-6 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2"/></svg>
                                    </div>
                                    <h3 class="font-black text-[10px] md:text-xs uppercase tracking-widest text-white group-hover:text-cyan-400 transition-colors">Telemetry</h3>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            setTimeout(() => { if(document.getElementById('vpd-temp')) updateVPDGauge(); }, 100);
        }

        function handleSearch() {
            currentSearchTerm = document.getElementById('searchInput').value;
            showCatalog();
        }

        document.getElementById('searchInput').addEventListener('input', handleSearch);
        
        handleInitialLoad();

                navigator.serviceWorker.register('./sw.js').then(registration => {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }, err => {

            });
        }
    </script>
</body>
